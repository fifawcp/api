services:
  # Development database
  db:
    image: postgres:16.3
    container_name: db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fifawcp
    ports:
      - "5432:5432"
    volumes:
      - postgres_dev_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fifawcp"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Test database
  test-db:
    image: postgres:16.3
    container_name: test-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: fifawcp_test
    ports:
      - "5433:5432"
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fifawcp_test"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Redis cache
  redis:
    image: redis:7-alpine
    container_name: redis
    command: redis-server --requirepass ${REDIS_PASSWORD} --logLevel warning
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    environment:
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "PING"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  # Redis Commander - Web UI for Redis
  redis-commander:
    image: rediscommander/redis-commander:latest
    platform: linux/amd64
    container_name: redis-commander
    hostname: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:${REDIS_PASSWORD}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    depends_on:
      - redis

  # API server
  server:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: server
    working_dir: /app
    volumes:
      - .:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    env_file:
      - .env
    environment:
      DB_ADDRESS: ${DB_ADDRESS}
      DB_TEST_ADDRESS: ${DB_TEST_ADDRESS}
      REDIS_ADDRESS: ${REDIS_ADDRESS}
      PORT: ${PORT}
      CGO_ENABLED: "1"
      GOFLAGS: "-buildvcs=false"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  postgres_dev_data:
  postgres_test_data:
  redis_data:
  go_mod_cache:
  go_build_cache:
